# camera-import.conf — Configuration for camera-import.sh
# Copy this to /etc/camera-import.conf and edit for your environment.

# ── Camera mount paths (used as fallback if gphoto2 is unavailable) ──
D7500_MOUNT="/media/cwfrazier/NIKON D7500"
Z5_MOUNT="/media/cwfrazier/NIKON Z 5"

# ── Local storage ──
IMPORT_DIR="/home/cwfrazier/original-pictures"
ARCHIVE_DIR="/home/cwfrazier/original-pictures-archive"

# ── Synology backup (NFS/SMB mount on Proxmox host) ──
SYNOLOGY_BACKUP_DIR="/mnt/synology/backup/camera"

# ── Immich ──
IMMICH_URL="http://immich.local:2283"
IMMICH_API_KEY=""

# ── rclone remote names (configure these with `rclone config`) ──
RCLONE_GOOGLE_PHOTOS="gphotos"
RCLONE_AMAZON_PHOTOS="amazon"
RCLONE_APPLE_PHOTOS="apple"

# ── Notification (optional — set to "yes" to get notified) ──
NOTIFY_ON_COMPLETE="no"
NOTIFY_EMAIL=""

# ── Logging ──
LOG_FILE="/var/log/camera-import.log"
